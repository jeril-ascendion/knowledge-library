name: Deploy site to S3

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and sync to S3 + invalidate CloudFront
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install -r tools/requirements-build.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-bge-small-en-v1.5

      - name: Run full build
        # build_all.py orchestrates 8 steps: seed stubs, build static site,
        # chunks, vectors, index.json, schema.json, gold refs, llms.txt
        run: python tools/build_all.py

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::852973339602:role/github-access-knowledgelibrary
          aws-region: ap-southeast-2
          role-session-name: github-actions-knowledge-library

      - name: Sync built site to S3
        run: |
          aws s3 sync dist/ s3://ascendion-engineering-site \
            --delete \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        env:
          CLOUDFRONT_DISTRIBUTION_ID: E2O2I6L3GV59TM
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
