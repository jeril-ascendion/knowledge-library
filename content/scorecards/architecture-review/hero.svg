<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Stacked horizontal bar-fill cascade">
<!--
  Architecture Review Scorecard emblem.

  Visual metaphor: independent dimensional scoring producing one
  collective verdict. Four horizontal score-tracks stacked vertically.
  Each track carries a faint warm-neutral baseline running x=12 to x=104.
  A terracotta fill bar grows left-to-right along each track, starting
  at x=12 and ending at a DIFFERENT target x — encoding that each
  review dimension scores independently and the per-dimension scores
  vary. Bar growths are staggered so the visual reads as a cascade of
  independent ratings landing in sequence. After all four bars have
  completed their fills, a small terracotta verdict mark appears below
  the lowest bar (centred at x=58, y=82) encoding the aggregate verdict.

  Mechanic #60: STACKED HORIZONTAL BAR-FILL CASCADE.
  First mechanic to use multiple parallel horizontal fills with VARYING
  endpoints PLUS a separate aggregate verdict element appearing after
  the cascade completes. Distinct from #11 vertical bars rising (purely
  vertical, all bars reach same height), #45 sequential vertical fill
  (bottom-to-top, all bars reach the top), #51 lifecycle progression
  (single horizontal track with moving marker), #56 progressive
  threshold fill (single horizontal fill with checkpoint pauses).

  Geometry:
    Track baselines: x=12 → x=104 at y=20, 36, 52, 68 (warm neutral).
    Fill targets per track:    x=92 (track 1, score ≈ 87%)
                                x=72 (track 2, score ≈ 65%)
                                x=98 (track 3, score ≈ 94%)
                                x=80 (track 4, score ≈ 74%)
    Verdict mark: small filled circle r=2.5 centred at (58, 82).

  Cycle: 10s.
    0.05–0.20  Track 1 fill grows 12 → 92
    0.25–0.40  Track 2 fill grows 12 → 72
    0.45–0.60  Track 3 fill grows 12 → 98
    0.65–0.80  Track 4 fill grows 12 → 80
    0.82–0.88  Verdict mark fades in
    0.88–0.95  Hold all fills + verdict
    0.95–1.00  Fade out, reset

  Colour: warm-neutral #D6D2C8 + terracotta #C96330.
-->

  <!-- Track baselines (faint warm-neutral) -->
  <line x1="12" y1="20" x2="104" y2="20" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="36" x2="104" y2="36" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="52" x2="104" y2="52" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="12" y1="68" x2="104" y2="68" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Track 1 fill (target x=92) -->
  <line x1="12" y1="20" x2="12" y2="20" stroke="#C96330" stroke-width="2.4" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;92;92;12"
             keyTimes="0;0.05;0.20;0.95;1"
             dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Track 2 fill (target x=72) -->
  <line x1="12" y1="36" x2="12" y2="36" stroke="#C96330" stroke-width="2.4" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;72;72;12"
             keyTimes="0;0.25;0.40;0.95;1"
             dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Track 3 fill (target x=98) -->
  <line x1="12" y1="52" x2="12" y2="52" stroke="#C96330" stroke-width="2.4" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;98;98;12"
             keyTimes="0;0.45;0.60;0.95;1"
             dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Track 4 fill (target x=80) -->
  <line x1="12" y1="68" x2="12" y2="68" stroke="#C96330" stroke-width="2.4" stroke-linecap="round">
    <animate attributeName="x2"
             values="12;12;80;80;12"
             keyTimes="0;0.65;0.80;0.95;1"
             dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- Aggregate verdict mark — appears after all four bars complete -->
  <circle cx="58" cy="82" r="2.5" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.82;0.88;0.95;1"
             dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
