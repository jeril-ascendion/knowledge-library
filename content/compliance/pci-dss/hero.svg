<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cardholder data crossing CDE boundary with shape transformation at tokenisation point">
<!--
  PCI DSS emblem.

  Visual metaphor: cardholder data (PAN) crosses the CDE boundary
  via tokenisation. Approaching the boundary as raw PAN (a circle
  shape representing volatile sensitive data), it transforms at the
  boundary into a token (a square shape representing opaque
  non-sensitive data) which then continues into the non-CDE
  environment. The vertical boundary line (warm-neutral) divides
  the canvas at x=60. The animation shows three sequential token
  emissions, each crossing the boundary and undergoing shape
  transformation, encoding the PCI DSS architectural pattern of
  reducing CDE scope through tokenisation.

  Geometry:
    Boundary line (warm-neutral vertical): x=60, y=14 to y=78
    Boundary label tick marks: small horizontal pips at y=14, 78
                                indicating the boundary surface
    Token paths: three sequential crossings at staggered timings:
      Path 1: horizontal at y=24, crosses boundary at t=0.20
      Path 2: horizontal at y=45, crosses boundary at t=0.40
      Path 3: horizontal at y=66, crosses boundary at t=0.60

  Each crossing involves:
    - Pre-boundary: terracotta CIRCLE (r=3.5) approaches from left,
      starts at x=14, moves to x=58 (just before boundary)
    - At boundary (x=60): CIRCLE fades out, RECTANGLE fades in at
      same y position
    - Post-boundary: terracotta SQUARE (rect 6×6) continues from
      x=62 to x=104

  The three paths run sequentially (not simultaneously) so the
  transformation is legibly visible. After the third crossing, all
  three tokens (squares) remain visible on the right side and pulse
  on independent sub-cycles encoding tokens are persistent in
  the non-CDE environment whereas the PANs were ephemeral.

  Mechanic #73: BOUNDARY-CROSSING SHAPE TRANSFORMATION.
  First mechanic to use SHAPE MORPHING (circle → rectangle) at a
  boundary crossing. Distinct from #15 horizontal traversal — that
  uses a single shape moving across uniform track with no
  transformation; #73 has two distinct shapes representing
  different data states with explicit transformation event at the
  boundary. Distinct from #54 dual-track parallel lifecycle —
  that has two parallel horizontal tracks; #73 has one track but
  with a transformation point dividing pre- and post- states.
  Distinct from #67 dual-node failover — that has two static nodes
  alternating; #73 has one moving entity that changes form
  during traversal. Distinct from #68 stacked control-layer
  verification — that has a marker descending vertically through
  layers; #73 has markers traversing horizontally across a single
  boundary with shape change. The architectural signature is
  state-transformation-at-trust-boundary: data exists in different
  forms on either side of a trust boundary, and the boundary's
  purpose is to perform the transformation that converts sensitive
  to non-sensitive form before propagation.

  Cycle: 8s; sub-cycles 1.0s/1.4s/1.8s for post-boundary square
  pulses.
    0.00–0.05  Empty / reset
    0.05–0.10  Boundary line and tick marks fade in
    0.10–0.20  Path 1 PAN circle moves x=14 → x=58 at y=24
    0.20–0.22  Transformation: circle fades, square appears at boundary
    0.22–0.32  Path 1 token square moves x=62 → x=104 at y=24
    0.30–0.40  Path 2 PAN circle moves x=14 → x=58 at y=45
    0.40–0.42  Transformation
    0.42–0.52  Path 2 token square moves x=62 → x=104 at y=45
    0.50–0.60  Path 3 PAN circle moves x=14 → x=58 at y=66
    0.60–0.62  Transformation
    0.62–0.72  Path 3 token square moves x=62 → x=104 at y=66
    0.72–0.85  All three tokens (squares) at right side, pulsing
                on independent sub-cycles 1.0s, 1.4s, 1.8s
    0.85–0.95  Fade out
    0.95–1.00  Cleared, reset

  Colour: warm-neutral #D6D2C8 + terracotta #C96330.
-->

  <!-- Boundary line (vertical warm-neutral, full canvas height) -->
  <line x1="60" y1="14" x2="60" y2="78" stroke="#D6D2C8" stroke-width="1.6"
        stroke-linecap="round" stroke-dasharray="3 3" opacity="0">
    <animate attributeName="opacity"
             values="0;0;0.7;0.7;0"
             keyTimes="0;0.05;0.10;0.85;0.95"
             dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- Boundary tick marks (top and bottom) -->
  <line x1="56" y1="14" x2="64" y2="14" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0.7;0" keyTimes="0;0.05;0.10;0.85;0.95" dur="8s" repeatCount="indefinite"/>
  </line>
  <line x1="56" y1="78" x2="64" y2="78" stroke="#D6D2C8" stroke-width="1.4" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" values="0;0;0.7;0.7;0" keyTimes="0;0.05;0.10;0.85;0.95" dur="8s" repeatCount="indefinite"/>
  </line>

  <!-- ============== PATH 1 (y=24) ============== -->
  <!-- PAN circle (pre-boundary) -->
  <circle cy="24" r="3.5" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.10;0.12;0.20;0.22"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cx"
             values="14;14;58;58;14"
             keyTimes="0;0.10;0.20;0.22;1"
             dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Token square (post-boundary) -->
  <rect width="6" height="6" y="21" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.20;0.22;0.85;0.92"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x"
             values="59;59;62;101;101;59"
             keyTimes="0;0.20;0.22;0.32;0.85;1"
             dur="8s" repeatCount="indefinite"/>
    <!-- Sustained pulse via width/height — keep visible squarely -->
    <animate attributeName="width" values="6;7;6" keyTimes="0;0.5;1" dur="1.0s" repeatCount="indefinite"/>
    <animate attributeName="height" values="6;7;6" keyTimes="0;0.5;1" dur="1.0s" repeatCount="indefinite"/>
  </rect>

  <!-- ============== PATH 2 (y=45) ============== -->
  <!-- PAN circle -->
  <circle cy="45" r="3.5" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.30;0.32;0.40;0.42"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cx"
             values="14;14;14;58;58;14"
             keyTimes="0;0.30;0.32;0.40;0.42;1"
             dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Token square -->
  <rect width="6" height="6" y="42" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.40;0.42;0.85;0.92"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x"
             values="59;59;62;101;101;59"
             keyTimes="0;0.40;0.42;0.52;0.85;1"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="width" values="6;7;6" keyTimes="0;0.5;1" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="height" values="6;7;6" keyTimes="0;0.5;1" dur="1.4s" repeatCount="indefinite"/>
  </rect>

  <!-- ============== PATH 3 (y=66) ============== -->
  <!-- PAN circle -->
  <circle cy="66" r="3.5" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.50;0.52;0.60;0.62"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cx"
             values="14;14;14;58;58;14"
             keyTimes="0;0.50;0.52;0.60;0.62;1"
             dur="8s" repeatCount="indefinite"/>
  </circle>
  <!-- Token square -->
  <rect width="6" height="6" y="63" fill="#C96330" opacity="0">
    <animate attributeName="opacity"
             values="0;0;1;1;0"
             keyTimes="0;0.60;0.62;0.85;0.92"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="x"
             values="59;59;62;101;101;59"
             keyTimes="0;0.60;0.62;0.72;0.85;1"
             dur="8s" repeatCount="indefinite"/>
    <animate attributeName="width" values="6;7;6" keyTimes="0;0.5;1" dur="1.8s" repeatCount="indefinite"/>
    <animate attributeName="height" values="6;7;6" keyTimes="0;0.5;1" dur="1.8s" repeatCount="indefinite"/>
  </rect>
</svg>
