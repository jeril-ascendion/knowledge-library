<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
<!--
  Databases emblem.

  Visual metaphor: data being persisted into stratified layers. Small
  items appear at the top of the canvas and fall to settle into stacked
  rows at the bottom — like sediment accumulating into geological strata.
  Once the stack is built, the whole structure briefly holds, then
  dissolves and the cycle restarts.

  Layout: 5 falling items per cycle, each landing in a different position
  to build a 5-wide single row at the bottom (the 'data layer'). The row
  is 5 small rectangles wide. Each item's animation translates its y
  from the top (15) to the floor (65) over a fraction of the cycle,
  with staggered start times so items fall in sequence not simultaneously.

  Animation per item:
    appear at top (y=15), opacity 1
    translate y from 15 to 65 over 0.6s (the fall)
    rest at floor for the remainder of the cycle
    fade out at end of cycle (with all others)

  Cycle: 6s total
    0.0–3.0s: 5 items fall in sequence (each takes 0.6s, staggered every 0.5s)
      Item 1: falls 0.0–0.6s, lands at x=30
      Item 2: falls 0.5–1.1s, lands at x=42
      Item 3: falls 1.0–1.6s, lands at x=54
      Item 4: falls 1.5–2.1s, lands at x=66
      Item 5: falls 2.0–2.6s, lands at x=78
    3.0–5.0s: full stack visible (1.0s settled)
    5.0–6.0s: all items fade simultaneously
    cycle repeats

  A faint floor line at y=70 anchors the geometry.

  Motion mechanic: SEDIMENTATION STACKING (the seventeenth in the
  catalogue). Distinct from #1 (radial particle convergence) by being
  unidirectional vertical fall under gravity rather than radial
  inward. Distinct from #10 (accretive composition) because items
  TRAVEL to their position rather than appearing in place. Distinct
  from #14 (scaling envelope) because items accumulate monotonically
  rather than rising-and-falling.

  Two colours only: warm neutral (#D6D2C8) for the falling items and
  the floor line, terracotta (#C96330) outline once landed (to mark
  'now persisted').
-->

<!-- ─── Floor line (the storage layer) ─── -->
<line x1="20" y1="70" x2="100" y2="70" stroke="#D6D2C8" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.6"/>

<!-- ─── Item 1: lands at x=30, falls 0.0–0.6s in 6s cycle = keyTimes 0.0–0.10 ─── -->
<rect x="27" width="6" height="6" rx="1" fill="#D6D2C8" stroke="#C96330" stroke-width="1" opacity="0">
  <animate attributeName="y"
           values="15; 64; 64; 64"
           keyTimes="0; 0.10; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity"
           values="1; 1; 1; 0"
           keyTimes="0; 0.10; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ─── Item 2: lands at x=42, falls 0.5–1.1s = keyTimes 0.083–0.183 ─── -->
<rect x="39" width="6" height="6" rx="1" fill="#D6D2C8" stroke="#C96330" stroke-width="1" opacity="0">
  <animate attributeName="y"
           values="15; 15; 64; 64; 64"
           keyTimes="0; 0.083; 0.183; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity"
           values="0; 1; 1; 1; 0"
           keyTimes="0; 0.083; 0.183; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ─── Item 3: lands at x=54, falls 1.0–1.6s = keyTimes 0.167–0.267 ─── -->
<rect x="51" width="6" height="6" rx="1" fill="#D6D2C8" stroke="#C96330" stroke-width="1" opacity="0">
  <animate attributeName="y"
           values="15; 15; 64; 64; 64"
           keyTimes="0; 0.167; 0.267; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity"
           values="0; 1; 1; 1; 0"
           keyTimes="0; 0.167; 0.267; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ─── Item 4: lands at x=66, falls 1.5–2.1s = keyTimes 0.25–0.35 ─── -->
<rect x="63" width="6" height="6" rx="1" fill="#D6D2C8" stroke="#C96330" stroke-width="1" opacity="0">
  <animate attributeName="y"
           values="15; 15; 64; 64; 64"
           keyTimes="0; 0.25; 0.35; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity"
           values="0; 1; 1; 1; 0"
           keyTimes="0; 0.25; 0.35; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>

<!-- ─── Item 5: lands at x=78, falls 2.0–2.6s = keyTimes 0.333–0.433 ─── -->
<rect x="75" width="6" height="6" rx="1" fill="#D6D2C8" stroke="#C96330" stroke-width="1" opacity="0">
  <animate attributeName="y"
           values="15; 15; 64; 64; 64"
           keyTimes="0; 0.333; 0.433; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
  <animate attributeName="opacity"
           values="0; 1; 1; 1; 0"
           keyTimes="0; 0.333; 0.433; 0.83; 1"
           dur="6s" repeatCount="indefinite"/>
</rect>
</svg>
