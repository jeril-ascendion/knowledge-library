<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
<!--
  DevOps emblem.

  Visual metaphor: a continuous delivery pipeline that never stops.
  Five dots travel along a closed rectangular path representing the
  CI/CD loop: build → test → deploy → observe → back to build. Each
  dot is at a different position around the loop, so the motion is
  always full, always continuous — the pipeline is never empty.

  Loop geometry: a rectangle from (20, 30) to (100, 60) — width 80,
  height 30. The path traces:
    Top edge:    (20, 30) → (100, 30)  [80 units]
    Right edge:  (100, 30) → (100, 60) [30 units]
    Bottom edge: (100, 60) → (20, 60)  [80 units]
    Left edge:   (20, 60) → (20, 30)   [30 units]
    Total: 220 units

  Each dot's position around the loop is parameterised by a single
  parameter t (0 to 1) representing fraction of loop traversed:
    t=0 to 80/220=0.364:  along top, x = 20 + 80*t/0.364, y = 30
    t=0.364 to 110/220=0.5: along right, x = 100, y = 30 + 30*(t-0.364)/0.136
    t=0.5 to 190/220=0.864: along bottom, x = 100 - 80*(t-0.5)/0.364, y = 60
    t=0.864 to 1: along left, x = 20, y = 60 - 30*(t-0.864)/0.136

  We approximate this with keyframes — 5 dots, each starting at a
  different t-offset, all completing one loop in 6 seconds.

  For each dot, we use values for cx and cy along the path, with
  keyTimes evenly spaced along the perimeter. With 5 keyframes plus
  the start/end repeat, we get smooth-enough motion.

  Path keyframes (corners):
    (20, 30) → (100, 30) → (100, 60) → (20, 60) → (20, 30)
    keyTimes: 0, 0.364, 0.5, 0.864, 1.0

  Each dot starts at a different point on the perimeter using its
  begin offset. Begin offsets: 0s, 1.2s, 2.4s, 3.6s, 4.8s in a 6s
  cycle. Equivalent t-positions: 0, 0.2, 0.4, 0.6, 0.8.

  Motion mechanic: CONVEYOR LOOP (the nineteenth in the catalogue).
  Distinct from #1 (radial particle convergence — particles moving
  inward to a centre) by being a closed-loop perimeter traversal.
  Distinct from #16 (bidirectional pipeline traffic — dots moving
  along straight lanes in opposite directions) by being a single
  closed loop with multi-directional traversal.

  Two colours only: warm neutral (#D6D2C8) for the static loop path,
  terracotta (#C96330) for the moving dots.
-->

<!-- ─── The static loop path (rounded rectangle) ─── -->
<rect x="20" y="30" width="80" height="30" rx="3" fill="none" stroke="#D6D2C8" stroke-width="1.5" stroke-dasharray="2.5,2.5" opacity="0.7"/>

<!-- ─── 5 dots traversing the loop, each offset by 1.2s in a 6s cycle ─── -->

<!-- Dot 1: begin=0s -->
<circle cx="20" cy="30" r="2.5" fill="#C96330">
  <animate attributeName="cx"
           values="20; 100; 100; 20; 20"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="0s" repeatCount="indefinite"/>
  <animate attributeName="cy"
           values="30; 30; 60; 60; 30"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="0s" repeatCount="indefinite"/>
</circle>

<!-- Dot 2: begin=-1.2s (so it's 1/5 ahead = at t=0.2) -->
<circle cx="20" cy="30" r="2.5" fill="#C96330">
  <animate attributeName="cx"
           values="20; 100; 100; 20; 20"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-1.2s" repeatCount="indefinite"/>
  <animate attributeName="cy"
           values="30; 30; 60; 60; 30"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-1.2s" repeatCount="indefinite"/>
</circle>

<!-- Dot 3: begin=-2.4s -->
<circle cx="20" cy="30" r="2.5" fill="#C96330">
  <animate attributeName="cx"
           values="20; 100; 100; 20; 20"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-2.4s" repeatCount="indefinite"/>
  <animate attributeName="cy"
           values="30; 30; 60; 60; 30"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-2.4s" repeatCount="indefinite"/>
</circle>

<!-- Dot 4: begin=-3.6s -->
<circle cx="20" cy="30" r="2.5" fill="#C96330">
  <animate attributeName="cx"
           values="20; 100; 100; 20; 20"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-3.6s" repeatCount="indefinite"/>
  <animate attributeName="cy"
           values="30; 30; 60; 60; 30"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-3.6s" repeatCount="indefinite"/>
</circle>

<!-- Dot 5: begin=-4.8s -->
<circle cx="20" cy="30" r="2.5" fill="#C96330">
  <animate attributeName="cx"
           values="20; 100; 100; 20; 20"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-4.8s" repeatCount="indefinite"/>
  <animate attributeName="cy"
           values="30; 30; 60; 60; 30"
           keyTimes="0; 0.364; 0.5; 0.864; 1"
           dur="6s" begin="-4.8s" repeatCount="indefinite"/>
</circle>
</svg>
